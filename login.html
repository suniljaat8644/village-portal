<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Officer Login - Gram Suvidha</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #2e7d32 0%, #1b5e20 100%); height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; }
        .login-card { background: white; border-radius: 25px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
        .btn-login { background: #2e7d32; color: white; border-radius: 12px; padding: 12px; font-weight: 700; width: 100%; border: none; transition: 0.3s; }
        .btn-login:hover { background: #1b5e20; transform: translateY(-2px); }
        .form-control { border-radius: 10px; padding: 12px; border: 1px solid #ddd; }
        .back-home { text-decoration: none; color: #666; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="login-card text-center">
        <img src="logo.png" alt="Logo" style="width: 80px; margin-bottom: 20px;">
        <h4 class="fw-bold mb-1">Officer Login</h4>
        <p class="text-muted small mb-4">Enter credentials to access dashboard</p>

        <form id="loginForm">
            <div class="mb-3 text-start">
                <label class="small fw-bold mb-1">Officer ID / Email</label>
                <input type="email" id="email" class="form-control" placeholder="admin@gram.com" required>
            </div>
            <div class="mb-4 text-start">
                <label class="small fw-bold mb-1">Password</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-login">Login to Portal</button>
        </form>

        <div class="mt-4">
            <a href="index.html" class="back-home">⬅ Back to Home</a>
        </div>
    </div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { firebaseConfig } from './firebase-config.js';

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const loginForm = document.getElementById('loginForm');

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        try {
            console.log("Attempting login for:", email);
            const userCredential = await signInWithEmailAndPassword(auth, email, password);
            
            // Success!
            console.log("Logged in as:", userCredential.user.email);
            alert("Login Successful! Chaliye Dashboard par.");
            window.location.href = "admin-dashboard.html";
            
        } catch (error) {
            console.error("Firebase Login Error:", error.code, error.message);
            
            // Specific Error Messages
            if (error.code === 'auth/invalid-credential') {
                alert("ID ya Password galat hai. (Check: Kya aapne Firebase Console > Users mein ye ID banayi hai?)");
            } else if (error.code === 'auth/network-request-failed') {
                alert("Internet check karein ya file ko Live Server par chalayein.");
            } else if (error.code === 'auth/too-many-requests') {
                alert("Bahut baar galat try kiya. Thodi der baad koshish karein.");
            } else {
                alert("Error: " + error.code);
            }
        }
    });
</script>
</body>
</html>
