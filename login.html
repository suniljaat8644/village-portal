<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Officer Login - Gram Suvidha</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #2e7d32 0%, #1b5e20 100%);
            height: 100vh;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .login-card {
            background: white; padding: 40px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 100%; max-width: 400px;
        }
        .btn-success { background-color: #2e7d32; border: none; padding: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <img src="logo.png" alt="Logo" style="width: 70px;">
            <h3 class="mt-3 fw-bold text-success">Officer Login</h3>
            <p class="text-muted small">Digital Village Management Portal</p>
        </div>
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Officer ID</label>
                <input type="text" id="userid" class="form-control" placeholder="admin" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Secret Password</label>
                <input type="password" id="pass" class="form-control" placeholder="••••" required>
            </div>
            <button type="submit" class="btn btn-success w-100 shadow">Access Dashboard</button>
        </form>
        <div class="text-center mt-3">
            <a href="index.html" class="text-muted small" style="text-decoration:none;">← Back to Home</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            // Simple logic for Demo: user 'admin' pass '1234'
            const user = document.getElementById('userid').value;
            const pass = document.getElementById('pass').value;
            
            if(user === "admin" && pass === "Germ@1234") {
                window.location.href = "admin-dashboard.html";
            } else {
                alert("For demo, use User:admin and Pass: Germ@1234");
            }
        });
    </script>
</body>
</html>
