<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agriculture - Gram Suvidha</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .mandi-card { border-left: 5px solid #2e7d32; margin-bottom: 10px; }
        .price-up { color: green; font-weight: bold; }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand" href="index.html">⬅ Back to Home</a>
        </div>
    </nav>

    <div class="container mt-4">
        <h2 class="mb-3">🌾 Agriculture Updates</h2>
        
        <div class="card mb-4 p-3 shadow-sm bg-white text-center">
            <h5>Current Weather: 32°C</h5>
            <p class="text-muted">Perfect for harvesting today.</p>
        </div>

        <h4>Today's Mandi Rates</h4>
        <div class="card mandi-card p-3 shadow-sm">
            <div class="d-flex justify-content-between">
                <span><strong>Wheat (Gehu)</strong></span>
               <span class="price-up">₹<span id="wheat-price">Loading...</span> / quintal</span>
            </div>
        </div>
        <div class="card mandi-card p-3 shadow-sm">
            <div class="d-flex justify-content-between">
                <span><strong>Mustard (Sarson)</strong></span>
                <span class="price-up">₹<span id="mustard-price">Loading...</span> / quintal</span>
            </div>
        </div>
    </div>
    
<script>
    function updateAgricultureData() {
        console.log("Agriculture Backend: Fetching data...");
        
        // This is a 'Mock' Backend. It waits 1 second then updates the price.
        setTimeout(() => {
            const wheatPrice = document.getElementById('wheat-price');
            if(wheatPrice) {
                wheatPrice.innerText = "2,480"; // The 'new' price from the backend
                console.log("Agriculture Backend: Success!");
            }
        }, 1000);
    }

    // Start the process when the page opens
    window.onload = updateAgricultureData;
</script>
</body>
</html>
