<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Care - Village Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #e3f2fd; } /* Light blue for health */
        .health-card { border-radius: 15px; border: none; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .emergency-btn { background-color: #d32f2f; color: white; font-weight: bold; width: 100%; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="index.html">⬅ Back to Home</a>
        </div>
    </nav>

    <div class="container mt-4">
        <h2 class="text-center mb-4">🏥 Health & Emergency</h2>

        <div class="card health-card p-3 border-danger">
            <h5>🚑 Emergency Ambulance</h5>
            <p class="text-muted">Directly call the emergency helpline.</p>
            <a href="tel:108" class="btn emergency-btn">CALL 108 NOW</a>
        </div>

        <div class="card health-card p-3">
            <h5>📍 Nearest Hospital</h5>
            <p class="text-muted">Find the fastest route to the nearest clinic.</p>
            <button onclick="findHospital()" class="btn btn-outline-primary w-100">Open Maps</button>
        </div>

        <div class="card health-card p-3">
            <h5>💳 Ayushman Bharat</h5>
            <p class="text-muted">Check your eligibility for free treatment.</p>
            <a href="https://pmjay.gov.in/" target="_blank" class="btn btn-success w-100">Check Status</a>
        </div>
    </div>

    <script>
        function findHospital() {
            // Backend logic to open maps with a search for hospitals
            window.open("https://www.google.com/maps/search/hospital+near+me/");
        }
    </script>

</body>
</html>
