<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Weather - Gram Suvidha</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4f8; font-family: 'Segoe UI', sans-serif; }
        
        .weather-header { 
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); 
            color: white; padding: 50px 20px; 
            border-bottom-left-radius: 35px; border-bottom-right-radius: 35px; 
            text-align: center; position: relative;
        }
        
        .back-btn { 
            position: absolute; top: 20px; left: 20px; 
            color: white; text-decoration: none; font-size: 1.1rem; 
            background: rgba(255,255,255,0.2); padding: 5px 15px; 
            border-radius: 20px; backdrop-filter: blur(5px);
        }

        .main-temp-card { 
            background: white; border-radius: 25px; padding: 35px; 
            margin-top: -40px; box-shadow: 0 12px 30px rgba(0,0,0,0.1); 
            border: none; text-align: center; 
        }

        .temp-display { font-size: 4.5rem; font-weight: 800; color: #1e3c72; line-height: 1; }
        
        /* 7-Day Scroll Bar Styles */
        .forecast-scroll { 
            display: flex; overflow-x: auto; gap: 15px; 
            padding: 20px 5px; scrollbar-width: none; 
            -ms-overflow-style: none;
        }
        .forecast-scroll::-webkit-scrollbar { display: none; }

        .forecast-item { 
            background: #f8fafd; min-width: 100px; padding: 20px 10px; 
            border-radius: 20px; text-align: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.03); 
            border: 1px solid #edf2f7;
        }

        .forecast-item .day-name { color: #64748b; font-size: 0.9rem; margin-bottom: 8px; }
        .forecast-item .day-temp { color: #1e3c72; font-weight: 700; font-size: 1.2rem; }
        
        .loader-spinner { color: #1e3c72; }
    </style>
</head>
<body>

    <div class="weather-header">
        <a href="index.html" class="back-btn">⬅ Back</a>
        <h1 class="fw-bold">Mausam Jankari</h1>
        <p class="opacity-75">Live 7-Day Forecast for your Farm</p>
    </div>

    <div class="container">
        <div class="main-temp-card">
            <div id="loader">
                <div class="spinner-border loader-spinner" role="status"></div>
                <p class="mt-3 text-muted">📍 Detecting Your Village Location...</p>
            </div>

            <div id="weather-content" style="display:none;">
                <p class="text-muted mb-1"><span id="loc-status">Your Current Area</span></p>
                <h2 class="temp-display"><span id="curr-temp">--</span>°C</h2>
                <p id="curr-desc" class="fs-5 fw-bold text-primary mb-4">Clear Sky</p>
                
                <hr style="opacity: 0.1;">
                
                <p class="text-start small fw-bold text-muted text-uppercase mb-2">Next 7 Days Forecast</p>
                <div class="forecast-scroll" id="forecast-list">
                    </div>
            </div>
        </div>
        
        <div class="card border-0 shadow-sm rounded-4 mt-4 p-3 bg-light">
            <div class="d-flex align-items-center">
                <span class="fs-2 me-3">💡</span>
                <p class="mb-0 small text-dark"><strong>Kisan Tip:</strong> Check forecast before spraying pesticides. Avoid spraying if rain is expected in next 6 hours.</p>
            </div>
        </div>
    </div>

    <script>
        async function getFullWeather() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const { latitude, longitude } = pos.coords;
                    
                    try {
                        const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true&daily=weathercode,temperature_2m_max&timezone=auto`);
                        const data = await res.json();
                        
                        document.getElementById('loader').style.display = 'none';
                        document.getElementById('weather-content').style.display = 'block';
                        
                        // Set Current Temp
                        const currentTemp = Math.round(data.current_weather.temperature);
                        document.getElementById('curr-temp').innerText = currentTemp;
                        
                        // Set Weather Description based on code
                        const code = data.current_weather.weathercode;
                        let description = "Clear Sky";
                        if(code > 0 && code <= 3) description = "Partly Cloudy";
                        if(code >= 51) description = "Rain Expected";
                        document.getElementById('curr-desc').innerText = description;

                        // Forecast List
                        const forecastList = document.getElementById('forecast-list');
                        const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
                        
                        forecastList.innerHTML = ""; // Clear loader
                        data.daily.time.forEach((date, i) => {
                            const d = new Date(date);
                            const dayName = i === 0 ? "Today" : days[d.getDay()];
                            const dailyCode = data.daily.weathercode[i];
                            const maxTemp = Math.round(data.daily.temperature_2m_max[i]);
                            
                            let icon = "☀️";
                            if(dailyCode > 0 && dailyCode <= 3) icon = "⛅";
                            if(dailyCode >= 51) icon = "🌧️";
                            
                            forecastList.innerHTML += `
                                <div class="forecast-item">
                                    <div class="day-name fw-bold">${dayName}</div>
                                    <div class="fs-1 my-2">${icon}</div>
                                    <div class="day-temp">${maxTemp}°</div>
                                </div>`;
                        });
                    } catch (error) {
                        document.getElementById('loader').innerHTML = "❌ Error fetching weather data.";
                    }
                }, (error) => {
                    document.getElementById('loader').innerHTML = "📍 Please allow location access to see weather.";
                });
            } else {
                document.getElementById('loader').innerHTML = "❌ Browser doesn't support Geolocation.";
            }
        }
        
        window.onload = getFullWeather;
    </script>
</body>
</html>
