<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scholarships - Village Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #fffde7; } /* Light yellow theme for education */
        .scholarship-card { border-radius: 15px; border: none; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .status-open { color: #2e7d32; font-weight: bold; }
        .status-closed { color: #d32f2f; font-weight: bold; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-warning">
        <div class="container">
            <a class="navbar-brand text-dark" href="index.html">⬅ Back to Home</a>
        </div>
    </nav>

    <div class="container mt-4">
        <h2 class="text-center mb-4">🎓 Student Scholarships</h2>

        <div class="card scholarship-card p-3">
            <h5>Pre-Matric Scholarship</h5>
            <p class="text-muted">For students from Class 1 to 10.</p>
            <div class="d-flex justify-content-between align-items-center">
                <span id="status1" class="status-open">Status: Checking...</span>
                <a href="https://scholarships.gov.in/" target="_blank" class="btn btn-primary btn-sm">Apply Now</a>
            </div>
        </div>

        <div class="card scholarship-card p-3">
            <h5>Post-Matric Scholarship</h5>
            <p class="text-muted">For ITI, Diploma, and Degree students.</p>
            <div class="d-flex justify-content-between align-items-center">
                <span id="status2" class="status-open">Status: Checking...</span>
                <a href="https://scholarships.gov.in/" target="_blank" class="btn btn-primary btn-sm">Apply Now</a>
            </div>
        </div>
    </div>

    <script>
        // This is the "brain" for the scholarship page
        function updateStatus() {
            // In a real app, this would check the date automatically
            document.getElementById('status1').innerHTML = "Status: ✅ OPEN";
            document.getElementById('status2').innerHTML = "Status: ✅ OPEN";
            console.log("Scholarship backend logic initialized.");
        }
        
        window.onload = updateStatus;
    </script>
    </body>
</html>
